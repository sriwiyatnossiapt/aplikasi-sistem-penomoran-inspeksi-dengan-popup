<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Penomoran Inspeksi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { background-color: #f0f2f5; }
    .sidebar {
      background-color: #1e2a3a; min-height: 100vh; width: 260px; position: fixed; top: 0; left: 0;
      padding: 1.5rem 1rem; color: #fff; transition: all 0.3s; z-index: 1000; display: flex; flex-direction: column;
    }
    .sidebar .brand { font-size: 1.25rem; font-weight: 700; border-bottom: 1px solid #3a4a5e; padding-bottom: 0.75rem; margin-bottom: 1.5rem; text-align: center; }
    .sidebar .nav-link { color: #b0c4de; padding: 0.7rem 1rem; border-radius: 0.4rem; transition: background 0.2s, color 0.2s; text-decoration: none; display: block; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #2c3e56; color: #fff; }
    .sidebar .nav-link i { margin-right: 0.75rem; width: 1.25rem; text-align: center; }
    .sidebar .nav-link.spreadsheet-link { color: #2ecc71; }
    .sidebar .nav-link.spreadsheet-link:hover { background-color: #27ae60; color: #fff; }
    .sidebar .footer-text { margin-top: auto; padding-top: 0.75rem; border-top: 1px solid #3a4a5e; font-size: 0.75rem; color: #8a9aa8; text-align: center; }
    .main-content { margin-left: 260px; padding: 2rem; min-height: 100vh; }
    .card { border-radius: 1rem; border: none; box-shadow: 0 0.5rem 1.2rem rgba(0,0,0,0.06); }
    .card-header { background: transparent; border-bottom: 1px solid #e9ecef; font-weight: 600; }
    .form-label { font-weight: 500; margin-bottom: 0.25rem; }
    .form-control, .form-select { border-radius: 0.5rem; border: 1px solid #ced4da; padding: 0.5rem 0.75rem; }
    .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.2); }
    .btn-primary { background-color: #0d6efd; border: none; padding: 0.6rem 1.5rem; font-weight: 500; border-radius: 0.5rem; }
    .btn-primary:hover { background-color: #0b5ed7; }
    .result-box { border-radius: 0.75rem; padding: 1rem 1.25rem; margin-top: 1.5rem; }
    .result-box .nomor { font-size: 1.5rem; font-weight: 700; font-family: 'Courier New', monospace; background: #e9ecef; padding: 0.3rem 0.8rem; border-radius: 0.4rem; display: inline-block; }
    @media (max-width: 768px) {
      .sidebar { width: 100%; position: relative; min-height: auto; flex-direction: row; flex-wrap: wrap; padding: 0.75rem 1rem; justify-content: space-between; align-items: center; }
      .sidebar .brand { border-bottom: none; margin-bottom: 0; padding-bottom: 0; font-size: 1rem; }
      .sidebar .nav { flex-direction: row !important; gap: 0.25rem; flex-wrap: wrap; }
      .sidebar .nav-link { padding: 0.3rem 0.7rem; font-size: 0.85rem; }
      .sidebar .footer-text { display: none; }
      .main-content { margin-left: 0; padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand"><i class="fas fa-clipboard-list me-2"></i>Sistem Penomoran</div>
    <nav class="nav flex-column">
      <a href="#" class="nav-link active"><i class="fas fa-edit"></i> Input Data</a>
      <a href="#" class="nav-link spreadsheet-link" onclick="window.open('https://docs.google.com/spreadsheets/d/1zRrJUe2x6nO62HiEKX73mspp_OnCnna4_LgcoUmhSHs/edit?gid=0#gid=0','_blank')"><i class="fas fa-table"></i> Buka Spreadsheet</a>
    </nav>
    <div class="footer-text"><i class="fas fa-shield-alt me-1"></i> v1.0</div>
  </div>

  <div class="main-content">
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
          <div class="card">
            <div class="card-header"><h4 class="mb-0"><i class="fas fa-pen-alt me-2"></i>Formulir Inspeksi</h4></div>
            <div class="card-body">
              <form id="inspectionForm" onsubmit="submitForm(event)">

                <!-- Timestamp -->
                <div class="row mb-3">
                  <div class="col-12">
                    <label for="timestampInput" class="form-label">Timestamp</label>
                    <input type="text" id="timestampInput" readonly class="form-control bg-light text-secondary font-monospace">
                  </div>
                </div>

                <!-- Judul Berita Acara -->
                <div class="row mb-3">
                  <div class="col-12">
                    <label for="judulBeritaAcara" class="form-label">Judul Berita Acara</label>
                    <input type="text" id="judulBeritaAcara" required placeholder="Masukkan judul berita acara..." class="form-control">
                  </div>
                </div>

                <!-- Jenis Usaha + Jenis Inspeksi -->
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="jenisUsaha" class="form-label">Jenis Usaha</label>
                    <select id="jenisUsaha" required class="form-select">
                      <option value="" disabled selected>-- Pilih --</option>
                      <option value="A">A: IOT dan atau IEBA</option>
                      <option value="B">B: UKOT atau UMOT</option>
                      <option value="C">C: IF Produksi OBA,OK dan atau SK</option>
                      <option value="D">D: IP Produksi SK</option>
                      <option value="F">F: IK Produksi SK</option>
                      <option value="G">G: Importir OBA,OK dan atau SK</option>
                      <option value="H">H: BUBP kontrak OBA,OK dan atau SK</option>
                      <option value="I">I: PBOT dan atau PBF</option>
                      <option value="J">J: Fasyankes, fasyanfar dan atau IFP</option>
                      <option value="K">K: Pengecer</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label for="jenisInspeksi" class="form-label">Jenis Inspeksi</label>
                    <select id="jenisInspeksi" required class="form-select">
                      <option value="" disabled selected>-- Pilih --</option>
                      <option value="ST">ST: sertifikasi/rekomendasi/fasber</option>
                      <option value="RT">RT: Rutin</option>
                      <option value="KG">KG: Kasus GMP</option>
                      <option value="KN">KN: Kasus Non-GMP</option>
                    </select>
                  </div>
                </div>

                <!-- Metode Inspeksi + Petugas -->
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="metodeInspeksi" class="form-label">Metode Inspeksi</label>
                    <select id="metodeInspeksi" required class="form-select">
                      <option value="" disabled selected>-- Pilih --</option>
                      <option value="OI">OI: Onsite Inspection</option>
                      <option value="RI">RI: Remote Inspection</option>
                      <option value="HI">HI: Hybrid Inspection</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label for="petugas" class="form-label">Nama Petugas</label>
                    <input type="text" id="petugas" required placeholder="Nama petugas..." class="form-control">
                  </div>
                </div>

                <!-- Tombol Submit -->
                <div class="d-grid gap-2 mt-4">
                  <button type="submit" id="btnSubmit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save me-2"></i>Generate & Simpan Nomor
                  </button>
                </div>
              </form>

              <!-- Hasil -->
              <div id="resultArea" class="result-box d-none">
                <p id="resultStatus" class="fw-bold mb-1"></p>
                <p id="resultDetail" class="nomor"></p>
                <p class="text-muted small mt-2"><i class="fas fa-copy me-1"></i>Klik 2× pada nomor untuk menyalin</p>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ============================
    //  KONFIGURASI
    // ============================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxDVEDVT8asXmjBvhYZRAKSLsnrCDyzMj8MgGxg66ZYf7_pAr8kTX5mLQOo4tbjZAO9/exec";

    // ============================
    //  TIMESTAMP
    // ============================
    function updateTimestampField() {
      const now = new Date();
      const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
      document.getElementById('timestampInput').value = now.toLocaleString('id-ID', options).replace(/\./g, ':');
    }
    updateTimestampField();
    setInterval(updateTimestampField, 1000);

    // ============================
    //  DOUBLE-CLICK COPY
    // ============================
    document.getElementById('resultDetail').addEventListener('dblclick', function() {
      const text = this.innerText;
      if (text) {
        navigator.clipboard.writeText(text).then(() => alert('Nomor disalin: ' + text))
          .catch(() => { const range = document.createRange(); range.selectNode(this); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); document.execCommand('copy'); alert('Nomor disalin: ' + text); });
      }
    });

    // ============================
    //  AUTO-FILL PETUGAS dari localStorage
    // ============================
    const inputPetugas = document.getElementById('petugas');
    const petugasTerakhir = localStorage.getItem('petugasTerakhir');
    if (petugasTerakhir) {
      inputPetugas.value = petugasTerakhir;
    }

    // ============================
    //  SEMBUNYIKAN HASIL SAAT USER MULAI INPUT
    // ============================
    function hideResultOnInteraction() {
      const resultArea = document.getElementById('resultArea');
      if (!resultArea.classList.contains('d-none')) {
        resultArea.classList.add('d-none');
      }
    }

    // Daftar elemen yang memicu sembunyi hasil
    const triggerElements = [
      document.getElementById('judulBeritaAcara'),
      document.getElementById('jenisUsaha'),
      document.getElementById('jenisInspeksi'),
      document.getElementById('metodeInspeksi'),
      document.getElementById('petugas'),
      document.getElementById('btnSubmit')
    ];

    triggerElements.forEach(el => {
      if (el) {
        el.addEventListener('focus', hideResultOnInteraction);
        if (el.tagName === 'SELECT') {
          el.addEventListener('change', hideResultOnInteraction);
        }
        if (el.tagName === 'INPUT') {
          el.addEventListener('input', hideResultOnInteraction);
        }
      }
    });

    // Klik di area form (selain tombol submit) juga menyembunyikan hasil
    document.getElementById('inspectionForm').addEventListener('click', function(e) {
      if (e.target.id !== 'btnSubmit') {
        hideResultOnInteraction();
      }
    });

    // ============================
    //  SUBMIT FORM
    // ============================
    async function submitForm(e) {
      e.preventDefault();

      const btn = document.getElementById('btnSubmit');
      const resultArea = document.getElementById('resultArea');
      const resultStatus = document.getElementById('resultStatus');
      const resultDetail = document.getElementById('resultDetail');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Memproses...';

      const eUsaha = document.getElementById('jenisUsaha');
      const eInspeksi = document.getElementById('jenisInspeksi');
      const eMetode = document.getElementById('metodeInspeksi');
      const eJudulBA = document.getElementById('judulBeritaAcara');
      const ePetugas = document.getElementById('petugas');
      const eTimestamp = document.getElementById('timestampInput').value;

      if (!ePetugas.value.trim()) {
        alert('⚠️ Nama petugas harus diisi!');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-2"></i>Generate & Simpan Nomor';
        return;
      }

      const payload = {
        timestamp: eTimestamp,
        judulBeritaAcara: eJudulBA.value,
        jenisUsaha: eUsaha.value,
        jenisUsahaText: eUsaha.options[eUsaha.selectedIndex].text,
        jenisInspeksi: eInspeksi.value,
        jenisInspeksiText: eInspeksi.options[eInspeksi.selectedIndex].text,
        metodeInspeksi: eMetode.value,
        metodeInspeksiText: eMetode.options[eMetode.selectedIndex].text,
        petugas: ePetugas.value.trim()
      };

      resultArea.classList.remove('d-none');

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const result = await response.json();
        if (result.status === 'success') {
          resultArea.className = 'result-box bg-success bg-opacity-10 text-success';
          resultStatus.innerText = "✓ Data Tersimpan!";
          resultDetail.innerText = result.nomor;

          localStorage.setItem('petugasTerakhir', ePetugas.value.trim());

          // Reset form (petugas tetap diisi)
          eJudulBA.value = "";
          eUsaha.value = "";
          eInspeksi.value = "";
          eMetode.value = "";
          ePetugas.value = localStorage.getItem('petugasTerakhir') || '';
        } else {
          throw new Error(result.message || 'Gagal menyimpan');
        }
      } catch (error) {
        resultArea.className = 'result-box bg-danger bg-opacity-10 text-danger';
        resultStatus.innerText = "✗ Gagal:";
        resultDetail.innerText = error.message;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save me-2"></i>Generate & Simpan Nomor';
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  </script>
</body>
</html>
