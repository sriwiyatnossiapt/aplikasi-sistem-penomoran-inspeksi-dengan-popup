<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Penomoran Inspeksi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md my-4">
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center border-b pb-3 border-slate-200">
      Sistem Penomoran Inspeksi
    </h2>
    
    <form id="inspectionForm" onsubmit="submitForm(event)" class="space-y-5">
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Timestamp</label>
        <input type="text" id="timestampInput" readonly class="w-full p-2.5 border border-slate-200 rounded-lg bg-slate-50 text-slate-500 font-mono text-sm focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Judul Berita Acara</label>
        <input type="text" id="judulBeritaAcara" required placeholder="Masukkan judul berita acara..." class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
      </div>
      
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Jenis Usaha</label>
        <select id="jenisUsaha" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
          <option value="" disabled selected>-- Pilih Jenis Usaha --</option>
          <option value="A">A: IOT dan atau IEBA</option>
          <option value="B">B: UKOT atau UMOT</option>
          <option value="C">C: IF Produksi OBA,OK dan atau SK</option>
          <option value="D">D: IP Produksi SK</option>
          <option value="F">F: IK Produksi SK</option> 
          <option value="G">G: Importir OBA,OK dan atau SK</option>
          <option value="H">H: BUBP kontrak OBA,OK dan atau SK</option>
          <option value="I">I: PBOT dan atau PBF</option>
          <option value="J">J: Fasyankes, fasyanfar dan atau IFP</option>
          <option value="K">K: Pengecer</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Jenis Inspeksi</label>
        <select id="jenisInspeksi" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
          <option value="" disabled selected>-- Pilih Jenis Inspeksi --</option>
          <option value="ST">ST: sertifikasi/rekomendasi/fasber</option>
          <option value="RT">RT: Rutin</option>
          <option value="KG">KG: Kasus GMP</option>
          <option value="KN">KN: Kasus Non-GMP</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Metode Inspeksi</label>
        <select id="metodeInspeksi" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
          <option value="" disabled selected>-- Pilih Metode Inspeksi --</option>
          <option value="OI">OI: Onsite Inspection</option>
          <option value="RI">RI: Remote Inspection</option>
          <option value="HI">HI: Hybrid Inspection</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Petugas</label>
        <input type="text" id="petugas" required placeholder="Nama petugas..." class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white text-sm">
      </div>

      <button type="submit" id="btnSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 shadow-sm cursor-pointer">
        Generate & Simpan Nomor
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="https://docs.google.com/spreadsheets/d/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/edit?usp=sharing" 
         target="_blank" 
         class="inline-block bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg transition duration-200 shadow-sm cursor-pointer text-sm">
        📊 Buka Spreadsheet Data
      </a>
      <p class="text-xs text-slate-400 mt-1">Ganti URL dengan link spreadsheet Anda</p>
    </div>

  </div>

  <script>
    // Ganti dengan URL GAS Anda (pastikan sudah di-deploy ulang)
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsMsBo7C6pA4wo3MCTF0NRkONSz2eO10W5bpmSdAYYZ5IM_2SwpFPdAN8wXtB05THx4w/exec";

    function updateTimestampField() {
      const now = new Date();
      const options = { 
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false 
      };
      document.getElementById('timestampInput').value = now.toLocaleString('id-ID', options).replace(/\./g, ':');
    }
    
    updateTimestampField();
    setInterval(updateTimestampField, 1000);

    // Counter lokal
    function getLocalCounter() {
      let counter = parseInt(localStorage.getItem('inspeksiCounter')) || 1;
      return counter;
    }

    function incrementLocalCounter() {
      let counter = getLocalCounter() + 1;
      localStorage.setItem('inspeksiCounter', counter);
    }

    async function submitForm(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerText = "Memproses...";
      btn.classList.add('opacity-50');
      
      const eUsaha = document.getElementById('jenisUsaha');
      const eInspeksi = document.getElementById('jenisInspeksi');
      const eMetode = document.getElementById('metodeInspeksi');
      const eJudulBA = document.getElementById('judulBeritaAcara');
      const ePetugas = document.getElementById('petugas');
      const eTimestamp = document.getElementById('timestampInput').value;
      
      // Validasi
      if (!eUsaha.value || !eInspeksi.value || !eMetode.value || !eJudulBA.value.trim() || !ePetugas.value.trim()) {
        alert('⚠️ Semua field harus diisi!');
        btn.disabled = false;
        btn.innerText = "Generate & Simpan Nomor";
        btn.classList.remove('opacity-50');
        return;
      }
      
      const payload = {
        timestamp: eTimestamp,
        judulBeritaAcara: eJudulBA.value.trim(),
        jenisUsaha: eUsaha.value,
        jenisUsahaText: eUsaha.options[eUsaha.selectedIndex].text,
        jenisInspeksiText: eInspeksi.options[eInspeksi.selectedIndex].text,
        metodeInspeksi: eMetode.value,
        metodeInspeksiText: eMetode.options[eMetode.selectedIndex].text,
        petugas: ePetugas.value.trim()
      };
      
      let nomorFinal = null;
      
      try {
        // --- Coba dengan mode 'cors' ---
        console.log('Mencoba dengan CORS...');
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const result = await response.json();
        if (result.status === 'success') {
          nomorFinal = result.nomor;
        } else {
          throw new Error(result.message || 'Gagal menyimpan data');
        }
        
        // Reset form
        eJudulBA.value = "";
        eUsaha.value = "";
        eInspeksi.value = "";
        eMetode.value = "";
        ePetugas.value = "";
        
        alert(`✅ Data berhasil disimpan!\n\nNomor Inspeksi (dari server):\n${nomorFinal}`);
        
      } catch (error) {
        // Jika cors gagal, periksa apakah itu karena CORS atau karena error lain
        const isCorsError = error.message.includes('Failed to fetch') || 
                            error.message.includes('NetworkError') ||
                            error.message.includes('Network request failed') ||
                            error.message === 'Failed to fetch';
        
        if (isCorsError) {
          // CORS error -> fallback ke no-cors (tapi tetap tidak bisa baca response)
          console.warn('CORS error, fallback ke no-cors...');
          try {
            await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            
            // Buat nomor lokal
            const tgl = new Date();
            const tahun2Digit = tgl.getFullYear().toString().slice(-2);
            const bulan = ("0" + (tgl.getMonth() + 1)).slice(-2);
            const jenisUsaha = eUsaha.value;
            const metodeInspeksi = eMetode.value;
            const counter = getLocalCounter();
            const nomorUrutFormat = ("000" + counter).slice(-3);
            const nomorLokal = `${tahun2Digit}.${bulan}.${jenisUsaha}.${metodeInspeksi}.25B.${nomorUrutFormat}`;
            
            // Naikkan counter
            incrementLocalCounter();
            
            // Reset form
            eJudulBA.value = "";
            eUsaha.value = "";
            eInspeksi.value = "";
            eMetode.value = "";
            ePetugas.value = "";
            
            alert(`⚠️ Data dikirim dengan mode no-cors (CORS gagal).\n\nNomor Inspeksi (lokal):\n${nomorLokal}\n\n🔴 Periksa spreadsheet: jika data tidak muncul, mungkin ada error di sisi server atau URL salah.`);
            
          } catch (noCorsError) {
            alert(`❌ Gagal mengirim data bahkan dengan no-cors:\n${noCorsError.message}`);
          }
        } else {
          // Bukan CORS error, misalnya URL salah atau GAS error
          alert(`❌ Gagal mengirim data (bukan CORS):\n${error.message}\n\nPeriksa URL GAS dan log server.`);
        }
      } finally {
        btn.disabled = false;
        btn.innerText = "Generate & Simpan Nomor";
        btn.classList.remove('opacity-50');
      }
    }
  </script>
</body>
</html>
